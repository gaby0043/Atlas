<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerary Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        #main {
            padding: 20px;
            background: white;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Itinerary Builder</h1>
    </header>
    <div class="container">
        <div id="main">
            <h2>Create Your Itinerary</h2>
            <form id="itinerary-form">
                <label for="destination">Destination:</label><br>
                <input type="text" id="destination" name="destination" required><br><br>
                <label for="start-date">Start Date:</label><br>
                <input type="date" id="start-date" name="start-date" required><br><br>
                <label for="end-date">End Date:</label><br>
                <input type="date" id="end-date" name="end-date" required><br><br>
                <input type="submit" value="Generate Itinerary">
            </form>
            <div id="output"></div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Itinerary Builder. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('itinerary-form').onsubmit = function(event) {
            event.preventDefault();
            const destination = document.getElementById('destination').value;
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const output = document.getElementById('output');
            output.innerHTML = `<h3>Your Itinerary:</h3><p><strong>Destination:</strong> ${destination}</p><p><strong>Start Date:</strong> ${startDate}</p><p><strong>End Date:</strong> ${endDate}</p>`;
        };
    </script>
</body>
</html>
